# ---------------------------------------------------------------------------
# SonarQube scanner configuration for CurrencyFlow.
# Run via: docker run --rm --network currencyflow_currencyflow-net \
#                  -v "${PWD}:/usr/src" \
#                  -e SONAR_HOST_URL=http://sonarqube:9000 \
#                  -e SONAR_TOKEN=<your token> \
#                  sonarsource/sonar-scanner-cli:latest
# ---------------------------------------------------------------------------

sonar.projectKey=currencyflow
sonar.projectName=CurrencyFlow
sonar.projectVersion=1.0

# Source roots (production code). Tests are listed separately so SonarQube
# applies different rules to them and excludes them from coverage targets.
sonar.sources=app.py,static,templates
sonar.tests=tests

# Python settings.
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml

# Exclude vendored, generated, and infrastructure-config files from analysis.
sonar.exclusions=\
    venv/**,\
    .venv/**,\
    **/__pycache__/**,\
    grafana/**,\
    prometheus/**,\
    jenkins/**,\
    .scannerwork/**,\
    coverage.xml

# Frontend assets are still scanned for issues (eslint-style rules) but we
# don't have a JS test runner configured, so don't penalize them on coverage.
sonar.coverage.exclusions=\
    static/**,\
    templates/**

sonar.sourceEncoding=UTF-8
