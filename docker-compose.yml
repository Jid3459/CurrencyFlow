# ---------------------------------------------------------------------------
# CurrencyFlow - Multi-container orchestration
#
# Brings up:
#   - app        : the Flask dashboard (built from local Dockerfile)
#   - prometheus : scrapes /metrics from the app every 15s
#   - grafana    : visualizes the metrics (auto-wired to Prometheus)
#
# Bring everything up (default stack):    docker compose up -d
# Bring up + SonarQube (heavy ~2 GB):     docker compose --profile quality up -d
# Bring up + Jenkins (~500 MB):           docker compose --profile ci up -d
# Bring up everything:                    docker compose --profile quality --profile ci up -d
# View logs:                              docker compose logs -f
# Stop everything:                        docker compose down
# Stop + delete data:                     docker compose down -v
# ---------------------------------------------------------------------------

services:
  app:
    build: .
    image: currencyflow:latest
    container_name: currencyflow-app
    ports:
      - "5000:5000"
    networks:
      - currencyflow-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: currencyflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      # Mount our scrape config (read-only) into the container.
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Persist Prometheus' time-series data across restarts.
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - currencyflow-net
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: currencyflow-grafana
    ports:
      - "3000:3000"
    environment:
      # Default credentials - change these for any non-demo deployment.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      # Persist Grafana settings + dashboards across restarts.
      - grafana-data:/var/lib/grafana
      # Auto-provision the Prometheus data source on first boot.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - currencyflow-net
    depends_on:
      - prometheus
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # SonarQube - code quality + security scanner.
  # Heavy (~2 GB RAM). Only starts when invoked with --profile quality.
  # -------------------------------------------------------------------------
  sonarqube:
    image: sonarqube:10.7-community
    container_name: currencyflow-sonarqube
    profiles:
      - quality
    ports:
      - "9000:9000"
    environment:
      # Embedded H2 database. Fine for local/demo use; production should use
      # an external Postgres (SonarQube refuses to run with H2 in prod mode).
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    networks:
      - currencyflow-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Jenkins - CI/CD orchestrator. Polls GitHub, runs the Jenkinsfile pipeline.
  # Custom image bakes in Python, Docker CLI, and sonar-scanner.
  # Runs as root to access the host Docker socket for image builds.
  # Only starts when invoked with --profile ci.
  # -------------------------------------------------------------------------
  jenkins:
    build:
      context: ./jenkins
    image: currencyflow-jenkins:latest
    container_name: currencyflow-jenkins
    profiles:
      - ci
    user: root
    ports:
      - "8080:8080"      # Jenkins UI
      - "50000:50000"    # agent communication
    volumes:
      - jenkins-data:/var/jenkins_home
      # Mount the host Docker socket so Jenkins can build/run/push images.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - currencyflow-net
    restart: unless-stopped

networks:
  currencyflow-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  jenkins-data:
